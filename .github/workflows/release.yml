name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables cross-platform emulation (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch release images
        run: |
          make push \
            VERSION=${{ steps.version.outputs.version }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          MANAGER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/manager-agent
          WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/worker-agent
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            Multi-architecture images (amd64 + arm64):

            ```bash
            # Manager
            docker pull ${{ env.MANAGER_IMAGE }}:${{ steps.version.outputs.version }}

            # Worker
            docker pull ${{ env.WORKER_IMAGE }}:${{ steps.version.outputs.version }}
            ```

            ## Quick Start

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install/hiclaw-install.sh | bash -s manager
            ```
