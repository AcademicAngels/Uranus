name: Integration Tests

on:
  workflow_run:
    workflows: ["Build Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Space-separated test numbers to run (e.g., '01 02 03'). Empty runs all."
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and tag images
        env:
          MANAGER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/manager-agent
          WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/worker-agent
        run: |
          docker pull ${MANAGER_IMAGE}:latest
          docker pull ${WORKER_IMAGE}:latest
          docker tag ${MANAGER_IMAGE}:latest hiclaw/manager-agent:latest
          docker tag ${WORKER_IMAGE}:latest hiclaw/worker-agent:latest

      - name: Install mc (MinIO Client)
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
          chmod +x /usr/local/bin/mc

      - name: Run integration tests
        env:
          HICLAW_LLM_API_KEY: ${{ secrets.HICLAW_LLM_API_KEY }}
          HICLAW_LLM_PROVIDER: ${{ secrets.HICLAW_LLM_PROVIDER || 'qwen' }}
          HICLAW_DEFAULT_MODEL: ${{ secrets.HICLAW_DEFAULT_MODEL || 'qwen3.5-plus' }}
          HICLAW_GITHUB_TOKEN: ${{ secrets.HICLAW_GITHUB_TOKEN }}
        run: |
          chmod +x tests/*.sh tests/lib/*.sh
          make test SKIP_BUILD=1 TEST_FILTER="${{ github.event.inputs.test_filter }}"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: /tmp/hiclaw-test-*.log
          retention-days: 7

      - name: Post PR comment
        if: github.event.workflow_run.event == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ job.status }}' === 'success' ? '✅ All integration tests passed' : '❌ Some integration tests failed';
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            });
            if (prs.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs.data[0].number,
                body: `### Integration Test Results\n${result}\n\n[View workflow run](${context.payload.workflow_run.html_url})`
              });
            }
