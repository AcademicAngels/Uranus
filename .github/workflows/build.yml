name: Build Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables cross-platform emulation (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      # PR builds: single-arch (fast feedback, no push)
      - name: Build images (PR - single arch, no push)
        if: github.event_name == 'pull_request'
        run: |
          make build \
            VERSION=${{ steps.meta.outputs.sha_short }} \
            DOCKER_PLATFORM=linux/amd64

      # Main branch: multi-arch build + push
      - name: Build and push multi-arch images (main)
        if: github.ref == 'refs/heads/main'
        run: |
          make push \
            VERSION=${{ steps.meta.outputs.sha_short }} \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }}

      - name: Tag latest on main
        if: github.ref == 'refs/heads/main'
        run: |
          make push \
            VERSION=latest \
            REGISTRY=${{ env.REGISTRY }} \
            REPO=${{ env.REPO }}

      - name: Summary
        env:
          MANAGER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/manager-agent
          WORKER_IMAGE: ${{ env.REGISTRY }}/${{ env.REPO }}/worker-agent
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Manager: \`${MANAGER_IMAGE}:${{ steps.meta.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Worker: \`${WORKER_IMAGE}:${{ steps.meta.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "- Platforms: \`linux/amd64, linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Platforms: \`linux/amd64\` (PR build, no push)" >> $GITHUB_STEP_SUMMARY
          fi
